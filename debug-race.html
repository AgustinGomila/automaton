<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Race Condition Diagnostic — automaton-worker</title>
    <style>
        body {
            font-family: monospace;
            background: #0f172a;
            color: #e2e8f0;
            padding: 2rem;
        }

        h1 {
            color: #38bdf8;
            margin-bottom: 0.25rem;
        }

        p.subtitle {
            color: #94a3b8;
            margin-top: 0;
            margin-bottom: 2rem;
        }

        .suite {
            margin-bottom: 2rem;
        }

        .suite h2 {
            color: #f1f5f9;
            font-size: 1rem;
            margin-bottom: 0.5rem;
            border-bottom: 1px solid #334155;
            padding-bottom: 0.25rem;
        }

        .case {
            padding: 0.75rem 1rem;
            margin: 0.5rem 0;
            border-radius: 6px;
        }

        .pass {
            background: #052e16;
            border-left: 4px solid #22c55e;
        }

        .fail {
            background: #2d0a0a;
            border-left: 4px solid #ef4444;
        }

        .info {
            background: #1e293b;
            border-left: 4px solid #94a3b8;
            color: #94a3b8;
            font-size: 0.85rem;
        }

        .label {
            font-weight: bold;
        }

        .pass .label {
            color: #4ade80;
        }

        .fail .label {
            color: #f87171;
        }

        .detail {
            margin-top: 0.35rem;
            color: #cbd5e1;
            font-size: 0.9rem;
        }

        .mono {
            color: #fbbf24;
        }

        #log {
            margin-top: 2rem;
        }
    </style>
</head>
<body>

<h1>Race Condition Diagnostic</h1>
<p class="subtitle">
    Verifica si <code>_applyResult</code> (XOR toggle) corrompe ediciones manuales<br>
    hechas en el hilo principal mientras el worker computa un paso.
</p>

<div id="results"></div>
<div id="log"></div>

<script>
    // ─── Utilidades ────────────────────────────────────────────────────────────────

    const resultsEl = document.getElementById('results');
    const logEl = document.getElementById('log');

    function addCase(title, passed, detail) {
        const div = document.createElement('div');
        div.className = 'case ' + (passed ? 'pass' : 'fail');
        div.innerHTML = `
        <div class="label">${passed ? '✓ PASS' : '✗ FAIL'} — ${title}</div>
        <div class="detail">${detail}</div>`;
        resultsEl.appendChild(div);
    }

    function addInfo(text) {
        const div = document.createElement('div');
        div.className = 'case info';
        div.textContent = text;
        resultsEl.appendChild(div);
    }

    function addSuite(title) {
        const div = document.createElement('div');
        div.className = 'suite';
        div.innerHTML = `<h2>${title}</h2>`;
        resultsEl.appendChild(div);
        return div;
    }

    // ─── Simulación de _applyResult — versión CON FIX (assign directo) ────────────
    //
    //   El worker ahora envía changedValues junto a changedCells.
    //   _applyResult hace grid[x][y] = values[i] en lugar de XOR toggle.
    //
    function applyResult(grid, changedCells, changedValues, changedCount, height) {
        const values = new Uint8Array(changedValues);
        for (let i = 0; i < changedCount; i++) {
            const idx = changedCells[i];
            const x = (idx / height) | 0;
            const y = idx % height;
            grid[x][y] = values[i];
        }
    }

    // ─── Builder de grid column-major ─────────────────────────────────────────────

    function makeGrid(w, h) {
        return Array.from({length: w}, () => new Uint8Array(h));
    }

    function serializeGrid(grid, w, h) {
        const flat = new Uint8Array(w * h);
        for (let x = 0; x < w; x++) {
            const base = x * h;
            for (let y = 0; y < h; y++) flat[base + y] = grid[x][y];
        }
        return flat;
    }

    // ─── Wrapper del worker ────────────────────────────────────────────────────────

    function createWorker() {
        return new Worker('scripts/infrastructure/workers/automaton-worker.js');
    }

    function initWorker(worker, grid, w, h, rule, neighborOffsets) {
        return new Promise(resolve => {
            worker.addEventListener('message', function onReady(e) {
                if (e.data.type === 'ready') {
                    worker.removeEventListener('message', onReady);
                    resolve();
                }
            });
            worker.postMessage({
                type: 'init',
                data: {
                    gridFlat: serializeGrid(grid, w, h),
                    width: w, height: h,
                    rule,
                    wrapEdges: false,   // bordes fijos — comportamiento determinista
                    neighborOffsets,
                    generation: 0
                }
            });
        });
    }

    function stepWorker(worker) {
        return new Promise(resolve => {
            worker.addEventListener('message', function onResult(e) {
                if (e.data.type === 'result') {
                    worker.removeEventListener('message', onResult);
                    resolve(e.data);
                }
            });
            worker.postMessage({type: 'step', data: {count: 1}});
        });
    }

    // Vecindad Moore radio-1 estándar (8 offsets)
    const MOORE_1 = [
        {dx: -1, dy: -1}, {dx: 0, dy: -1}, {dx: 1, dy: -1},
        {dx: -1, dy: 0}, {dx: 1, dy: 0},
        {dx: -1, dy: 1}, {dx: 0, dy: 1}, {dx: 1, dy: 1}
    ];

    // Regla Conway B3/S23
    const CONWAY = {birth: [3], survival: [2, 3]};

    // ─── SUITE 1: Celda fantasma (ghost cell) ─────────────────────────────────────
    //
    //   Escenario:
    //     - Celda (10,10) viva, sin vecinos → MUERE en el paso siguiente.
    //     - El worker la lista en changedCells (1→0).
    //     - El usuario borra (10,10) en el hilo principal ANTES del resultado.
    //       grid[10][10] ya es 0 cuando llega _applyResult.
    //     - _applyResult hace XOR: 0 → 1  ← celda fantasma!
    //
    //   Valor esperado tras _applyResult: grid[10][10] === 0  (muerta)
    //   Valor real si hay bug:            grid[10][10] === 1  (fantasma)

    async function testGhostCell() {
        const W = 20, H = 20;
        const grid = makeGrid(W, H);

        // Célula aislada en (10,10) — morirá (0 vecinos → no survives)
        grid[10][10] = 1;

        const worker = createWorker();
        await initWorker(worker, grid, W, H, CONWAY, MOORE_1);

        // Pedimos el paso y SINCRÓNICAMENTE (antes de que onmessage dispare)
        // simulamos que el usuario borra la celda.
        const resultPromise = stepWorker(worker);
        // ↓ Esto corre antes de que el worker responda — race condition real
        grid[10][10] = 0;   // usuario borra la celda mientras el worker computa
        const userEditValue = 0; // esperamos que quede muerta

        const data = await resultPromise;
        const changed = new Uint32Array(data.changedCells);

        // ¿El worker reportó (10,10) como cambiada?
        const idx1010 = 10 * H + 10;
        const workerReportedCell = [...changed].includes(idx1010);

        // Aplicamos _applyResult con el fix (assign directo)
        applyResult(grid, changed, data.changedValues, data.changedCount, H);

        const actualValue = grid[10][10];
        const passed = actualValue === userEditValue;

        worker.terminate();

        addCase(
            'Ghost cell: usuario borra celda moribunda',
            passed,
            `Worker reportó (10,10) en changedCells: <span class="mono">${workerReportedCell}</span> | ` +
            `Editado a: <span class="mono">${userEditValue}</span> | ` +
            `Tras _applyResult: <span class="mono">${actualValue}</span> | ` +
            `Esperado: <span class="mono">${userEditValue}</span>` +
            (!passed ? ' → <strong>XOR corrompió la edición del usuario → celda fantasma</strong>' : '')
        );

        return passed;
    }

    // ─── SUITE 2: Edición perdida (born cell erased) ──────────────────────────────
    //
    //   Escenario:
    //     - Celda (5,5) muerta rodeada de exactamente 3 vecinos vivos → NACE.
    //     - El worker la lista en changedCells (0→1).
    //     - El usuario dibuja (5,5) en el hilo principal (grid[5][5] = 1).
    //     - _applyResult XOR: 1 → 0  ← dibujo del usuario perdido
    //
    //   Valor esperado tras _applyResult: grid[5][5] === 1  (viva)
    //   Valor real si hay bug:            grid[5][5] === 0  (borrada)

    async function testLostEdit() {
        const W = 20, H = 20;
        const grid = makeGrid(W, H);

        // 3 vecinos alrededor de (5,5) — nacerá en el próximo paso
        // (con bordes fijos y wrapEdges=false, estos 3 vecinos son suficientes)
        grid[4][5] = 1;  // vecino izquierdo
        grid[6][5] = 1;  // vecino derecho
        grid[5][4] = 1;  // vecino arriba
        // (5,5) muerta con 3 vecinos → nace según B3

        const worker = createWorker();
        await initWorker(worker, grid, W, H, CONWAY, MOORE_1);

        const resultPromise = stepWorker(worker);
        // ↓ Race: usuario dibuja (5,5) mientras el worker computa
        grid[5][5] = 1;  // usuario pinta la celda que el worker va a "nacer"
        const userEditValue = 1; // esperamos que quede viva

        const data = await resultPromise;
        const changed = new Uint32Array(data.changedCells);

        const idx55 = 5 * H + 5;
        const workerReportedCell = [...changed].includes(idx55);

        applyResult(grid, changed, data.changedValues, data.changedCount, H);

        const actualValue = grid[5][5];
        const passed = actualValue === userEditValue;

        worker.terminate();

        addCase(
            'Lost edit: usuario dibuja celda que el worker nace',
            passed,
            `Worker reportó (5,5) en changedCells: <span class="mono">${workerReportedCell}</span> | ` +
            `Editado a: <span class="mono">${userEditValue}</span> | ` +
            `Tras _applyResult: <span class="mono">${actualValue}</span> | ` +
            `Esperado: <span class="mono">${userEditValue}</span>` +
            (!passed ? ' → <strong>XOR corrompió la edición del usuario → dibujo perdido</strong>' : '')
        );

        return passed;
    }

    // ─── SUITE 3: Sin edición concurrente — baseline ──────────────────────────────
    //
    //   Verifica que sin race condition, _applyResult produce el resultado correcto.
    //   Si este test falla, el error está en otra parte.

    async function testBaseline() {
        const W = 20, H = 20;
        const grid = makeGrid(W, H);

        // Glider mínimo en (2,2) — patrón conocido
        grid[2][1] = 1;
        grid[3][2] = 1;
        grid[1][3] = 1;
        grid[2][3] = 1;
        grid[3][3] = 1;

        const gridBefore = JSON.stringify(grid.map(col => Array.from(col)));

        const worker = createWorker();
        await initWorker(worker, grid, W, H, CONWAY, MOORE_1);

        // Sin edición manual — comportamiento limpio
        const data = await stepWorker(worker);
        const changed = new Uint32Array(data.changedCells);
        applyResult(grid, changed, data.changedValues, data.changedCount, H);

        // El worker debió reportar celdas cambiadas
        const passed = data.changedCount > 0;

        worker.terminate();

        addCase(
            'Baseline: paso sin edición concurrente',
            passed,
            `changedCount: <span class="mono">${data.changedCount}</span> | ` +
            `population: <span class="mono">${data.population}</span> | ` +
            `generation: <span class="mono">${data.generation}</span>`
        );

        return passed;
    }

    // ─── SUITE 4: Edición en celda NO reportada por el worker ─────────────────────
    //
    //   Si el usuario edita una celda que el worker NO incluyó en changedCells,
    //   la edición DEBE sobrevivir (no hay toggle para esa celda).
    //   Confirma que el bug es específico al XOR sobre celdas comunes.

    async function testEditOnUntouchedCell() {
        const W = 20, H = 20;
        const grid = makeGrid(W, H);

        // Celda aislada en (10,10) — morirá
        grid[10][10] = 1;

        const worker = createWorker();
        await initWorker(worker, grid, W, H, CONWAY, MOORE_1);

        const resultPromise = stepWorker(worker);
        // Editamos una celda DISTINTA que el worker no va a tocar
        grid[0][0] = 1;  // celda (0,0) estaba muerta, sin vecinos → no la lista el worker
        const userEditValue = 1;

        const data = await resultPromise;
        const changed = new Uint32Array(data.changedCells);

        const idx00 = 0 * H + 0;
        const workerReportedCell = [...changed].includes(idx00);

        applyResult(grid, changed, data.changedValues, data.changedCount, H);

        const actualValue = grid[0][0];
        const passed = actualValue === userEditValue && !workerReportedCell;

        worker.terminate();

        addCase(
            'Edición en celda no tocada por el worker (control)',
            passed,
            `Worker reportó (0,0): <span class="mono">${workerReportedCell}</span> | ` +
            `Editado a: <span class="mono">${userEditValue}</span> | ` +
            `Tras _applyResult: <span class="mono">${actualValue}</span>` +
            (!passed ? ' → <strong>Inesperado: esta celda no debería haber sido afectada</strong>' : ' → edición sobrevivió correctamente')
        );

        return passed;
    }

    // ─── Runner principal ─────────────────────────────────────────────────────────

    async function run() {
        addInfo('Protocolo: el test habla directamente con automaton-worker.js sin GridWorkerManager.');
        addInfo('FIX: el worker ahora envía changedValues (estado real). _applyResult hace assign directo en lugar de XOR toggle.');
        addInfo('Tests 3 y 4 deben pasar con el fix aplicado.');

        const results = [];
        results.push(await testBaseline());
        results.push(await testEditOnUntouchedCell());
        results.push(await testGhostCell());
        results.push(await testLostEdit());

        const failed = results.filter(r => !r).length;
        const passed = results.filter(r => r).length;

        addInfo(`─── Resultado: ${passed} pasaron, ${failed} fallaron ───`);
        if (failed > 0) {
            addInfo('Tests 3 y/o 4 fallando confirman que el bug es la race condition XOR en _applyResult.');
            addInfo('Tests 1–2 pasando confirman que el baseline y el control funcionan bien.');
        }
    }

    run().catch(err => {
        const div = document.createElement('div');
        div.className = 'case fail';
        div.innerHTML = `<div class="label">ERROR al cargar el worker</div><div class="detail">${err.message}<br><br>Asegurate de servir este archivo desde un HTTP server (no file://) desde el directorio raíz del proyecto.</div>`;
        resultsEl.appendChild(div);
        console.error(err);
    });
</script>
</body>
</html>
